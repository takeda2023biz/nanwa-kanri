<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>電話番号帳 | 南和グループ</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Sans','Yu Gothic',sans-serif;background:#f5f5f5;color:#333}
header{background:#1a2d5a;color:#fff;padding:16px 24px}
header h1{font-size:20px;font-weight:700}
header p{font-size:12px;opacity:.7;margin-top:2px}
.toolbar{background:#fff;border-bottom:1px solid #e0e0e0;padding:12px 24px;display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.toolbar input{flex:1;min-width:200px;padding:8px 12px;border:1px solid #ddd;border-radius:6px;font-size:14px}
.toolbar select{padding:8px 12px;border:1px solid #ddd;border-radius:6px;font-size:14px;background:#fff}
.count{padding:8px 24px;font-size:12px;color:#888}
.tbl-wrap{padding:0 24px 24px;overflow-x:auto}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.08)}
thead{background:#f8f8f8}
th{padding:10px 12px;text-align:left;font-size:12px;color:#666;border-bottom:2px solid #eee;cursor:pointer;white-space:nowrap;user-select:none}
th:hover{background:#f0f0f0}
td{padding:10px 12px;font-size:13px;border-bottom:1px solid #f0f0f0;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafafa}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.b-kanri{background:#1a2d5a;color:#fff}
.b-energy{background:#f5c400;color:#5a3d00}
.b-kankyo{background:#1a6fc4;color:#fff}
.b-eisei{background:#d94040;color:#fff}
.b-kensetsu{background:#2e7d32;color:#fff}
.b-zairyo{background:#0097a7;color:#fff}
.b-gray{background:#F1EFE8;color:#5F5E5A}
.b-iphone{background:#E6F1FB;color:#0C447C}
.b-android{background:#EAF3DE;color:#27500A}
.b-ipad{background:#EEEDFE;color:#3C3489}
.b-sha{background:#e8f4e8;color:#2e7d32;border:1px solid #a5d6a7}
.b-kojin{background:#fff3e0;color:#e65100;border:1px solid #ffcc80}
.phone-num{font-family:monospace;font-size:13px;font-weight:600;letter-spacing:.5px}
.empty{padding:40px;text-align:center;color:#aaa;font-size:14px}
.export-btn{padding:8px 16px;background:#1a2d5a;color:#fff;border:none;border-radius:6px;font-size:13px;cursor:pointer;white-space:nowrap}
.export-btn:hover{background:#2a3d6a}
</style>
</head>
<body>
<header>
  <h1>電話番号帳</h1>
  <p id="subtitle">社給携帯 — 電話番号一覧</p>
</header>
<div class="toolbar">
  <input type="text" id="search" placeholder="担当者名・電話番号・事業本部で検索..." oninput="render()">
  <select id="f-honbu" onchange="render()"><option value="">全事業本部</option></select>
  <select id="f-ownership" onchange="updateSubtitle();render()">
    <option value="">社給＋個人</option>
    <option value="社給">社給のみ</option>
    <option value="個人">個人のみ</option>
  </select>
  <button class="export-btn" onclick="exportCSV()">CSVエクスポート</button>
</div>
<div class="count" id="count"></div>
<div class="tbl-wrap" id="tbl-wrap"><div class="empty">読み込み中...</div></div>

<script>
const SUPABASE_URL = 'https://cicxvcjnvkynhukbnrns.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNpY3h2Y2pudmt5bmh1a2Jucm5zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwNjI4ODYsImV4cCI6MjA5MTYzODg4Nn0.MQs-YYzLJ-gEgvgY7vyw2NGwzqc76TLWIq08GDK8sMQ';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const HB_CLS = {
  '管理本部':'b-kanri',
  'エネルギー事業本部':'b-energy',
  '環境衛生事業本部':'b-kankyo',
  '衛生管理部':'b-eisei',
  '建設事業本部':'b-kensetsu',
  '建設資材事業本部':'b-zairyo'
};

let DATA = [];
let sortCol = 'yomi', sortDir = 1;

async function load(){
  const {data, error} = await sb
    .from('devices')
    .select('honbu, assignee, yomi, category, name, contract_no, phone, ownership')
    .eq('type','携帯')
    .not('phone','is',null)
    .order('honbu')
    .order('yomi');
  if(error){
    document.getElementById('tbl-wrap').innerHTML=
      '<div class="empty">データの読み込みに失敗しました</div>';
    return;
  }
  DATA = data || [];

  const honbus = [...new Set(DATA.map(d=>d.honbu).filter(Boolean))];
  const sel = document.getElementById('f-honbu');
  honbus.forEach(h=>{
    const o = document.createElement('option');
    o.value = h; o.textContent = h;
    sel.appendChild(o);
  });

  render();
}

function updateSubtitle(){
  const ow = document.getElementById('f-ownership').value;
  const map = {'':'社給＋個人携帯 — 電話番号一覧','社給':'社給携帯 — 電話番号一覧','個人':'個人携帯 — 電話番号一覧'};
  document.getElementById('subtitle').textContent = map[ow];
}

function sortBy(col){
  if(sortCol === col) sortDir = -sortDir;
  else { sortCol = col; sortDir = 1; }
  render();
}

function sortIcon(col){
  if(sortCol !== col) return '<span style="color:#ccc;margin-left:4px">↕</span>';
  return sortDir === 1
    ? '<span style="margin-left:4px">▲</span>'
    : '<span style="margin-left:4px">▼</span>';
}

function render(){
  const q = document.getElementById('search').value.trim();
  const hb = document.getElementById('f-honbu').value;
  const ow = document.getElementById('f-ownership').value;

  let filtered = DATA.filter(d=>{
    const mq = !q ||
      (d.assignee||'').includes(q) ||
      (d.yomi||'').includes(q) ||
      (d.phone||'').includes(q) ||
      (d.honbu||'').includes(q);
    const mh = !hb || d.honbu === hb;
    const mo = !ow || (d.ownership||'社給') === ow;
    return mq && mh && mo;
  });

  // ソート
  filtered.sort((a,b)=>{
    let av = a[sortCol]||'', bv = b[sortCol]||'';
    if(sortCol === 'assignee') { av = a.yomi||''; bv = b.yomi||''; }
    return av < bv ? -sortDir : av > bv ? sortDir : 0;
  });

  document.getElementById('count').textContent = `${filtered.length}件表示`;

  if(!filtered.length){
    document.getElementById('tbl-wrap').innerHTML =
      '<div class="empty">該当する番号が見つかりません</div>';
    return;
  }

  document.getElementById('tbl-wrap').innerHTML = `
    <table>
      <thead>
        <tr>
          <th style="width:170px" onclick="sortBy('honbu')">事業本部${sortIcon('honbu')}</th>
          <th style="width:110px" onclick="sortBy('assignee')">担当者${sortIcon('assignee')}</th>
          <th style="width:70px" onclick="sortBy('ownership')">区分${sortIcon('ownership')}</th>
          <th style="width:80px" onclick="sortBy('category')">カテゴリ${sortIcon('category')}</th>
          <th style="width:160px" onclick="sortBy('name')">機種名${sortIcon('name')}</th>
          <th style="width:110px" onclick="sortBy('contract_no')">契約番号（管理No）${sortIcon('contract_no')}</th>
          <th onclick="sortBy('phone')">携帯番号${sortIcon('phone')}</th>
        </tr>
      </thead>
      <tbody>
        ${filtered.map(d=>`
          <tr>
            <td><span class="badge ${HB_CLS[d.honbu]||'b-gray'}">${d.honbu||'—'}</span></td>
            <td style="font-weight:600">${d.assignee||'<span style="color:#ccc">未割当</span>'}</td>
            <td><span class="badge ${(d.ownership||'社給')==='個人'?'b-kojin':'b-sha'}">${d.ownership||'社給'}</span></td>
            <td><span class="badge ${d.category==='iPhone'?'b-iphone':d.category==='Android'?'b-android':'b-ipad'}">${d.category||'—'}</span></td>
            <td style="color:#555;font-size:12px">${d.name||'—'}</td>
            <td style="font-family:monospace;font-size:12px;color:#444;font-weight:600">${d.contract_no||'—'}</td>
            <td><span class="phone-num">${d.phone||'—'}</span></td>
          </tr>`).join('')}
      </tbody>
    </table>
  `;
}

function exportCSV(){
  const q = document.getElementById('search').value.trim();
  const hb = document.getElementById('f-honbu').value;
  const ow = document.getElementById('f-ownership').value;
  const filtered = DATA.filter(d=>{
    const mq = !q || (d.assignee||'').includes(q) || (d.phone||'').includes(q) || (d.honbu||'').includes(q);
    const mh = !hb || d.honbu === hb;
    const mo = !ow || (d.ownership||'社給') === ow;
    return mq && mh && mo;
  });
  const rows = [['事業本部','担当者','区分','カテゴリ','機種名','管理No','携帯番号']];
  filtered.forEach(d=>rows.push([d.honbu,d.assignee,d.ownership||'社給',d.category,d.name,d.contract_no,d.phone]));
  const csv = rows.map(r=>r.map(v=>`"${(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const bom = '\uFEFF';
  const blob = new Blob([bom+csv],{type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '電話番号帳.csv';
  a.click();
}

load();
</script>
</body>
</html>
